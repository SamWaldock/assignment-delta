appId: com.sam_waldock.coins_app
---
# 1. Launch app
- launchApp

# 2. Wait for list to load
- extendedWaitUntil:
    visible:
      text: 'Coins'
    timeout: 15000

# 3. Scroll down a few times
- scroll
- scroll
- scroll

# 4. Tap the 3rd visible coin in the list (index is 0-based)
- tapOn:
    id: 'coin-list-item'
    index: 2

# 5. Verify detail screen appears with coin name and data
- extendedWaitUntil:
    visible:
      text: 'Market Cap Rank'
    timeout: 10000

- assertVisible:
    text: 'Market Cap'

- assertVisible:
    text: '24h Volume'

- assertVisible:
    text: 'Change (24h)'

# 6. Pull down to refresh
- swipe:
    start: '50%, 25%'
    end: '50%, 75%'

# Wait for refresh to complete
- extendedWaitUntil:
    visible:
      text: 'Market Cap Rank'
    timeout: 15000

# 7. Verify data is still available after refresh
- assertVisible:
    text: 'Market Cap'

- assertVisible:
    text: '24h Volume'

- assertVisible:
    text: 'Change (24h)'
